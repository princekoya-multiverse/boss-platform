# Build and deploy BOSS Platform — simplified
name: Deploy BOSS Platform

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_HUB_USERNAME: warriorworld

jobs:
  build-boss-hud:
    name: Build BOSS HUD Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      
      - name: Build and push BOSS HUD
        uses: docker/build-push-action@v5
        with:
          context: ./docker/boss-hud
          file: ./docker/boss-hud/Dockerfile
          push: true
          tags: |
            warriorworld/boss-hud:latest
            warriorworld/boss-hud:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
