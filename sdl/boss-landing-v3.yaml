---
version: "2.0"
services:
  boss:
    image: nginx:alpine
    command:
      - sh
      - -c
      - |
        echo 'server { listen 80; location / { root /usr/share/nginx/html; index index.html; try_files $$uri $$uri/ /index.html; } }' > /etc/nginx/conf.d/default.conf &&
        echo '<!DOCTYPE html><html><head><title>BOSS</title><style>body{background:#0a0a0f;color:#fff;font-family:Inter,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}.container{text-align:center}.logo{font-size:5rem;font-weight:900;background:linear-gradient(135deg,#fff,#8888ff,#ff4488);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.tagline{color:rgba(255,255,255,.4);letter-spacing:.3em;text-transform:uppercase;margin-top:1rem}.status{display:inline-block;width:10px;height:10px;background:#00ff88;border-radius:50%;box-shadow:0 0 20px #00ff88;animation:pulse 2s infinite;margin-top:2rem}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}.network{margin-top:2rem;font-size:.8rem;color:rgba(255,255,255,.25)}</style></head><body><div class=container><div class=logo>BO$$</div><div class=tagline>Business Operating Solution System</div><div class=status></div><div class=network>Deployed on Akash Network &bull; Warrior World</div></div></body></html>' > /usr/share/nginx/html/index.html &&
        nginx -g 'daemon off;'
    expose:
      - port: 80
        as: 80
        proto: tcp
        to:
          - global: true
profiles:
  compute:
    boss:
      resources:
        cpu:
          units: 0.1
        memory:
          size: 128Mi
        storage:
          size: 256Mi
  placement:
    default:
      pricing:
        boss:
          denom: uakt
          amount: 50
deployment:
  boss:
    default:
      profile: boss
      count: 1
