# Build and deploy BOSS Platform
name: Deploy BOSS Platform

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - 'sdl/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  DOCKER_HUB_USERNAME: warriorworld
  AKASH_CONSOLE_API_KEY: ${{ secrets.AKASH_CONSOLE_API_KEY }}

jobs:
  build-huly:
    name: Build Huly Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      
      - name: Build and push Huly image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/huly
          file: ./docker/huly/Dockerfile
          push: true
          tags: |
            warriorworld/boss-huly:latest
            warriorworld/boss-huly:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-voice-agent:
    name: Build Voice Agent Image
    runs-on: ubuntu-latest
    needs: [build-huly]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      
      - name: Build and push Voice Agent image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/voice-agent
          file: ./docker/voice-agent/Dockerfile
          push: true
          tags: |
            warriorworld/boss-voice:latest
            warriorworld/boss-voice:${{ github.sha }}

  build-boss-hud:
    name: Build BOSS HUD Frontend
    runs-on: ubuntu-latest
    needs: [build-huly]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: |
          cd docker/boss-hud
          npm ci
      
      - name: Build
        run: |
          cd docker/boss-hud
          npm run build
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: boss-hud-build
          path: docker/boss-hud/out/

  deploy-akash:
    name: Deploy to Akash Network
    runs-on: ubuntu-latest
    needs: [build-huly, build-voice-agent, build-boss-hud]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy via Akash Console API
        env:
          AKASH_API_KEY: ${{ secrets.AKASH_CONSOLE_API_KEY }}
          SDL_FILE: sdl/huly-full-stack.yaml
        run: |
          # Update SDL with commit SHA tags
          sed -i "s/:latest/:${{ github.sha }}/g" $SDL_FILE
          
          # Deploy via Console API (validates SDL)
          curl -s -X POST "https://console-api.akash.network/v1/deployments" \
            -H "x-api-key: $AKASH_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"data\": {\"sdl\": \"$(cat $SDL_FILE | base64 -w 0)\", \"deposit\": 500000}}"
